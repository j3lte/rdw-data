name: Update Providers (Scheduled)
on:
  workflow_dispatch:
  schedule:
    # 1st and 3rd Sunday of each month (~every two weeks)
    - cron: 0 0 1-7,15-21 * 0

jobs:
  update-providers:
    name: Update Providers (Scheduled)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Fetch & Update Providers
        run: deno task fetch-data

        # We need to pull again, because we might have updated the providers
      - name: Pull Remote Changes
        run: git pull

      - name: Commit changes
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Providers (Automated)
          commit_options: "--no-verify"

      - name: "Run if changes have been detected"
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        run: echo "Changes detected"

      - name: "Run if no changes have been detected"
        if: steps.auto-commit-action.outputs.changes_detected == 'false'
        run: echo "No Changes detected"

      - name: "Create Release"
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        uses: rymndhng/release-on-push-action@master
        with:
          bump_version_scheme: minor
          tag_prefix: ""
