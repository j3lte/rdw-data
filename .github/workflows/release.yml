name: Update & Release

# Two ways in:
#   * schedule  — every two weeks: refetch the RDW database list. If anything
#                 changed, patch-bump and publish to JSR + npm.
#   * dispatch  — manual: optionally pin the version (else patch-bump). Always
#                 publishes + releases, even if the data did not change.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z). Leave blank to auto patch-bump."
        required: false
  schedule:
    # 1st and 3rd Sunday of each month (~every two weeks)
    - cron: 0 0 1-7,15-21 * 0

jobs:
  release:
    name: Update & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit provider updates + push + create release tag
      id-token: write # OIDC for JSR + npm trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Fetch & update providers
        run: deno task fetch-data

      - name: Decide whether to release
        id: gate
        run: |
          if [ -n "$(git status --porcelain src README.md)" ]; then
            CHANGED=true
          else
            CHANGED=false
          fi
          echo "changed=$CHANGED"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$CHANGED" = "true" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "No provider changes detected on scheduled run — nothing to release."
          fi

      - name: Determine version
        id: version
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            VERSION="${INPUT#v}"
          else
            LATEST="$(gh release view --json tagName -q .tagName 2>/dev/null || echo '0.0.0')"
            LATEST="${LATEST#v}"
            IFS=. read -r MAJOR MINOR PATCH <<< "$LATEST"
            VERSION="${MAJOR:-0}.${MINOR:-0}.$(( ${PATCH:-0} + 1 ))"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Set version in deno.json
        if: steps.gate.outputs.proceed == 'true'
        run: deno task set-version ${{ steps.version.outputs.version }}

      - name: Verify package (publish dry-run)
        if: steps.gate.outputs.proceed == 'true'
        run: deno publish --dry-run --allow-dirty

      - name: Commit changes
        if: steps.gate.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # `git add -A` stages new/deleted files too; `git commit -a` would only
          # pick up modified tracked files and silently drop newly generated
          # providers (e.g. Gebieden1/Locaties1 from the de-collide step).
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Update providers + release ${{ steps.version.outputs.version }}"
            git push
          fi

      - name: Create GitHub release
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create ${{ steps.version.outputs.version }}
          --target ${{ github.ref_name }}
          --title ${{ steps.version.outputs.version }}
          --generate-notes

      - name: Publish to JSR
        if: steps.gate.outputs.proceed == 'true'
        run: deno publish --allow-dirty

      - name: Build NPM package
        if: steps.gate.outputs.proceed == 'true'
        run: deno task npm ${{ steps.version.outputs.version }}

      # Trusted publishing (OIDC): no token, uses the job's id-token: write
      # permission. npm attaches provenance automatically.
      - name: Publish to NPM
        if: steps.gate.outputs.proceed == 'true'
        run: cd ./npm && npm publish --access public
